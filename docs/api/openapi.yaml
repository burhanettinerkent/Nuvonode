openapi: 3.0.3
info:
  title: Nuvonode Mesh API
  version: 0.1.0
  description: V1 API for Nuvonode Mesh. Includes dashboard REST endpoints and OpenAI-compatible model endpoints.
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []
paths:
  /health:
    get:
      security: []
      responses:
        '200':
          description: Health response
  /api/auth/register:
    post:
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Registered
  /api/auth/login:
    post:
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Logged in
  /api/projects:
    get:
      responses:
        '200': { description: Project list }
    post:
      responses:
        '200': { description: Project created }
  /api/projects/{project_id}/api-keys:
    get:
      parameters:
        - in: path
          name: project_id
          required: true
          schema: { type: string }
      responses:
        '200': { description: API key list }
    post:
      parameters:
        - in: path
          name: project_id
          required: true
          schema: { type: string }
      responses:
        '200': { description: API key created }
  /api/providers:
    get:
      responses:
        '200': { description: Provider list }
    post:
      responses:
        '200': { description: Provider created }
  /v1/models:
    get:
      responses:
        '200':
          description: OpenAI-compatible model list
  /v1/chat/completions:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCompletionRequest'
      responses:
        '200':
          description: OpenAI-compatible chat completion response
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    RegisterRequest:
      type: object
      required: [email, password, display_name]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        display_name: { type: string }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
    ChatCompletionRequest:
      type: object
      required: [model, messages]
      properties:
        model: { type: string }
        messages:
          type: array
          items:
            type: object
            required: [role, content]
            properties:
              role:
                type: string
                enum: [system, user, assistant]
              content:
                type: string
        max_tokens: { type: integer, minimum: 1, maximum: 8192 }
        temperature: { type: number, minimum: 0, maximum: 2 }
        top_p: { type: number, minimum: 0, maximum: 1 }
        stream: { type: boolean, default: false }
